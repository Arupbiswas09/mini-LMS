name: EAS Build & Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      profile:
        description: EAS build profile
        required: true
        default: preview
        type: choice
        options:
          - preview
          - production

concurrency:
  group: eas-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  eas-build-android:
    name: EAS Build – Android (${{ inputs.profile || 'preview' }})
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify EXPO_TOKEN is set
        run: |
          if [[ -z "$EXPO_TOKEN" ]]; then
            echo "::error::EXPO_TOKEN secret is not set. Go to GitHub → Settings → Secrets → Actions and add your Expo access token."
            exit 1
          fi
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      # Run CI quality gates before spending build minutes
      - name: Run lint
        run: npx eslint "src/**/*.{ts,tsx}" --max-warnings 0

      - name: Run type-check
        run: npx tsc --noEmit

      - name: Run tests
        run: npx jest --ci

      - name: EAS build (Android)
        run: |
          PROFILE="${{ inputs.profile || 'preview' }}"
          eas build \
            --platform android \
            --profile "$PROFILE" \
            --non-interactive \
            --no-wait
        env:
          EXPO_PUBLIC_SENTRY_DSN: ${{ secrets.EXPO_PUBLIC_SENTRY_DSN }}
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

  eas-build-ios:
    name: EAS Build – iOS (${{ inputs.profile || 'preview' }})
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify EXPO_TOKEN is set
        run: |
          if [[ -z "$EXPO_TOKEN" ]]; then
            echo "::error::EXPO_TOKEN secret is not set. Go to GitHub → Settings → Secrets → Actions and add your Expo access token."
            exit 1
          fi
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: EAS build (iOS)
        run: |
          PROFILE="${{ inputs.profile || 'preview' }}"
          eas build \
            --platform ios \
            --profile "$PROFILE" \
            --non-interactive \
            --no-wait
        env:
          EXPO_PUBLIC_SENTRY_DSN: ${{ secrets.EXPO_PUBLIC_SENTRY_DSN }}
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
